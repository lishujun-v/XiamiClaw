# OpenClaw 配置文件
# 可以通过修改此文件来更改模型和其他设置

# ============================================
# LLM 模型配置
# ============================================

# 当前使用的模型类型: deepseek / openai / anthropic / minimax / custom
model_provider: minimax

# DeepSeek 配置
deepseek:
  api_key: ""
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"  # deepseek-chat 或 deepseek-coder
  temperature: 0.7
  max_tokens: 4096
  timeout: 600
  stream: true

# OpenAI 配置 (如果你有 OpenAI API)
openai:
  api_key: "your-openai-api-key-here"
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o"
  temperature: 0.7
  max_tokens: 4096
  timeout: 600
  stream: true

# Anthropic (Claude) 配置
anthropic:
  api_key: "your-anthropic-api-key-here"
  model: "claude-sonnet-4-20250514"
  temperature: 0.7
  max_tokens: 4096
  timeout: 600
  stream: true

# Minimax 配置
minimax:
  api_key: "sk-cp-zn4PGHZT-OTC4jKZtHfuRsEFvOIFfr3Z6mWEaLIchYAijd1uASwyaPIDmncJ_S1-K0hWTJ1LZtu8qKqnY5p226t5X9NZv5qdF3Ak6FpFtZzeHWN4lxFggOA"
  base_url: "https://api.minimax.chat/v1"
  model: "MiniMax-M2.7"
  group_id: ""  # 团队ID，可选
  temperature: 0.7
  max_tokens: 4096
  timeout: 600
  stream: true

# 自定义 API (百应) 配置
custom:
  api_key: "sk-fc19155e-54de-475e-b259-5ea4ef8294ea_tool"
  model: "216224dc-465d-48d7-9aa2-2c177d7c2405"  # 替换成自己的modi id
  base_url: "https://llm-model-api-test.baiying.com.cn"
  session_id: "1-SHARE_TITLE"
  temperature: 0.7
  max_tokens: 8192
  timeout: 600
  read_timeout: 1800  # 读取超时(秒)，生成大内容时建议设置更长
  stream: true  # 是否开启流式返回

# ============================================
# Agent 配置
# ============================================

agent:
  # 最大循环次数，防止无限循环
  max_iterations: 100

  # 是否显示详细日志
  verbose: true

  # System Prompt 文件路径
  system_prompt_file: "prompts/fast_path_system_prompt.md"

# ============================================
# 日志配置
# ============================================

logging:
  level: "INFO"
  directory_name: "logs"
  max_file_size_mb: 5

# ============================================
# 多 Agent 配置
# ============================================

agents:
  # 默认 agent（如果没有指定使用哪个 agent，则使用这个）
  default: "agent1"

  # Agent 列表，每个 agent 有独立的工作目录
  list:
    - name: "agent1"
      workspace: "./workspace"
      description: "通用任务处理：代码开发、文件操作、信息搜索、日常任务等全能型工作"

    # - name: "agent2"
    #   workspace: "./workspace_agent2"
    #   description: "文档与报告撰写：Markdown 报告、文章创作、内容整理、文档编辑"

    # - name: "agent3"
    #   workspace: "./workspace_agent3"
    #   description: "测试与调试：代码测试、Bug 修复、性能优化、技术调研"

# ============================================
# CLI 配置
# ============================================

cli:
  # 欢迎信息
  welcome_message: "OpenClaw Agent"

  # 输入框宽度 (0 表示自动检测终端宽度)
  input_width: 0
